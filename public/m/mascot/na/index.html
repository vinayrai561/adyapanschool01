<!DOCTYPE html>
<html lang="en" style="background: transparent">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adyapan Mascot Kick</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body style="background: transparent">
    <main class="scene">
      <p class="hint">Click anywhere to kick the ball from the mascot's foot.</p>
    </main>

    <div id="mascot-stage" class="mascot-stage" aria-hidden="true">
      <div class="mascot-shell">
        <video
          id="mascot"
          class="mascot-img"
          playsinline
          muted
          preload="auto"
        ></video>
        <img
          id="mascot-kick-pose"
          class="mascot-kick-pose"
          alt=""
          draggable="false"
        />
        <div id="kick-toe" class="kick-toe-anchor" aria-hidden="true"></div>
      </div>
    </div>

    <script src="./mascot.js"></script>
  </body>
</html>
