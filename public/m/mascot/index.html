<!DOCTYPE html>
<html lang="en" style="background: transparent">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adyapan Mascot Kick</title>
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body style="background: transparent">
    <main class="scene">
      <p class="hint">Click anywhere to kick the ball from the mascot's foot.</p>
      <div class="transparency-controls">
        <button onclick="setTransparencyMode('default')">Default</button>
        <button onclick="setTransparencyMode('screen-mode')">Screen Mode</button>
        <button onclick="setTransparencyMode('multiply-mode')">Multiply Mode</button>
        <button onclick="setTransparencyMode('chroma-mode')">Chroma Mode</button>
        <button onclick="setTransparencyMode('css-transparent')">CSS Transparent</button>
      </div>
    </main>

    <div id="mascot-stage" class="mascot-stage">
      <div class="mascot-shell">
        <video
          id="mascot"
          class="mascot-img"
          playsinline
          muted
          preload="auto"
          loop
          autoplay
          src="./assets/mascot_juggle.webm?v=2"
        >
          <source src="./assets/mascot_juggle.webm?v=2" type="video/webm">
          Your browser does not support the video tag.
        </video>
        <img
          id="mascot-kick-pose"
          class="mascot-kick-pose"
          alt=""
          draggable="false"
          src="./assets/mascot_kick.png?v=2"
        />
        <div id="kick-toe" class="kick-toe-anchor"></div>
      </div>
    </div>

    <script src="./mascot.js?v=2"></script>
  </body>
</html>
