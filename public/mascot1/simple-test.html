<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Mascot Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: white;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        .video-wrapper {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin: 20px 0;
        }
        
        video {
            width: 300px;
            height: 300px;
            border: 3px solid #333;
            border-radius: 10px;
            display: block;
        }
        
        .info {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
        }
        
        .status {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        
        .success { background: rgba(76, 175, 80, 0.5); }
        .error { background: rgba(244, 67, 54, 0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Simple Mascot Video Test</h1>
        
        <div class="video-wrapper">
            <video id="testVideo" controls loop muted autoplay>
                <source src="./assets/mascot_juggle.webm" type="video/webm">
                Your browser doesn't support WebM video.
            </video>
        </div>
        
        <div class="info">
            <h3>📊 Video Status:</h3>
            <div id="status" class="status">Loading...</div>
            <div id="details"></div>
        </div>
        
        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #4CAF50; color: white;">
            🔄 Reload Test
        </button>
    </div>

    <script>
        const video = document.getElementById('testVideo');
        const statusDiv = document.getElementById('status');
        const detailsDiv = document.getElementById('details');
        
        function updateStatus() {
            let status = '';
            let details = '';
            let statusClass = '';
            
            if (video.readyState >= 2) {
                status = '✅ Video Loaded Successfully!';
                statusClass = 'success';
                details = `
                    <p><strong>File:</strong> mascot_juggle.webm</p>
                    <p><strong>Dimensions:</strong> ${video.videoWidth} x ${video.videoHeight}</p>
                    <p><strong>Duration:</strong> ${video.duration.toFixed(2)} seconds</p>
                    <p><strong>Current Time:</strong> ${video.currentTime.toFixed(2)}s</p>
                    <p><strong>Ready State:</strong> ${video.readyState}</p>
                    <p><strong>Paused:</strong> ${video.paused ? 'Yes' : 'No'}</p>
                `;
            } else {
                status = '⏳ Loading video...';
                statusClass = '';
                details = `<p><strong>Ready State:</strong> ${video.readyState}</p>`;
            }
            
            statusDiv.textContent = status;
            statusDiv.className = 'status ' + statusClass;
            detailsDiv.innerHTML = details;
        }
        
        video.addEventListener('loadeddata', () => {
            console.log('✅ Video loaded!');
            updateStatus();
        });
        
        video.addEventListener('error', (e) => {
            console.error('❌ Video error:', e);
            statusDiv.textContent = '❌ Failed to load video!';
            statusDiv.className = 'status error';
            detailsDiv.innerHTML = `
                <p><strong>Error:</strong> Could not load mascot_juggle.webm</p>
                <p><strong>Check:</strong> File exists at ./assets/mascot_juggle.webm</p>
            `;
        });
        
        video.addEventListener('timeupdate', updateStatus);
        
        // Initial check
        updateStatus();
        setInterval(updateStatus, 1000);
    </script>
</body>
</html>
